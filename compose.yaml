services:
  block-proxy:
    build: ./proxy
    container_name: adguard-blockpage-proxy
    env_file:
      - .env
    environment:
      - ADGUARD_URL=${ADGUARD_URL}
      - ADGUARD_USER_PASS=${ADGUARD_USER_PASS}
    restart: unless-stopped

  block-page:
    image: nginx:alpine
    container_name: adguard-blockpage    
    ports:
      - 8081:80  
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped