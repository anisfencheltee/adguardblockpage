<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sicher zu Hause | neinle.int</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="icon-area">
            <img src="./headImageBotCute.png" alt="Sicherheitsfilter" class="status-image">
        </div>

        <div class="card-content">
            <h1>Sicher zu Hause.</h1>
            <p>Dein Heimnetz hat diese Anfrage gefiltert, um Tracking oder unsichere Inhalte zu blockieren. Damit surfst
                du entspannter.</p>

            <div class="domain-box" id="domain">checking_domain...</div>

            <div class="details" id="reason">
                Wird über die AdGuard-API geprüft...
            </div>

            <div class="btn-group">
                <button onclick="history.back()" class="btn btn-primary">Einen Schritt zurück</button>
                <a href="https://home.neinle.int" class="btn btn-secondary">Zum Dashboard</a>
                <button onclick="requestWhitelist()" class="btn btn-text" id="whitelistBtn">
                    Fehlalarm? Seite trotzdem freigeben.
                </button>
            </div>
        </div>
    </div>

   <script src="scripts.js"></script>
</body>

</html>
