server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        # 'python-proxy' muss der Service-Name in deiner docker-compose.yml sein
        proxy_pass http://adguard-blockpage-proxy:5000/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}